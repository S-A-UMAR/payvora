upstream django_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Max upload size (useful for Cloudinary integration fallback / large payloads)
    client_max_body_size 50M;

    # Nginx Logs
    access_log /var/log/nginx/payvora_access.log;
    error_log /var/log/nginx/payvora_error.log;

    # Gzip Compression settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static assets
    location /static/ {
        alias /home/ubuntu/VTU/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Serve media uploads
    location /media/ {
        alias /home/ubuntu/VTU/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Forward all dynamic requests to Gunicorn
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
